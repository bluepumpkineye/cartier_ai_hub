name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # <-- FIX 1: Updated to v4 to remove the Node.js warning
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'YOUR_HF_USERNAME' and 'YOUR_SPACE_NAME' below!
          git push --force https://bluepumpkineye:$HF_TOKEN@huggingface.co/spaces/bluepumpkineye/cartier-ai-hub
          # ^^^ FIX 2: Added --force to overwrite the default Hugging Face files
